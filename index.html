<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StyleOrbit - Fashion Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .product-card:hover { transform: translateY(-10px); }
    </style>
</head>
<body class="bg-gray-50">

    <!-- Navbar -->
    <nav class="bg-white shadow sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <h1 class="text-3xl font-bold text-black">Style<span class="text-orange-500">Orbit</span></h1>
            
            <div class="flex-1 max-w-xl mx-8">
                <input id="search" type="text" placeholder="Search shirts, jeans, watches..." 
                       class="w-full border border-gray-300 rounded-full py-3 px-6 text-sm focus:outline-none focus:border-orange-500">
            </div>

            <div class="flex items-center gap-6">
                <button onclick="toggleCart()" class="relative">
                    <i class="fa-solid fa-bag-shopping text-2xl"></i>
                    <span id="cart-count" class="absolute -top-2 -right-2 bg-red-500 text-white text-xs font-bold w-5 h-5 rounded-full flex items-center justify-center">0</span>
                </button>
                <i class="fa-solid fa-user text-2xl cursor-pointer"></i>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <div class="bg-black text-white py-16">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <h1 class="text-5xl md:text-6xl font-bold">Wear What Makes You Unforgettable</h1>
            <p class="mt-4 text-lg text-gray-300">Premium Fashion • Best Prices • Fast Delivery</p>
        </div>
    </div>

    <!-- Products -->
    <section class="max-w-7xl mx-auto px-6 py-12">
        <h2 class="text-3xl font-bold mb-8">Trending This Season</h2>
        
        <div id="products-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <!-- JS se populate hoga -->
        </div>
    </section>

    <!-- Cart Drawer -->
    <div id="cart-drawer" class="hidden fixed top-0 right-0 h-full w-full md:w-96 bg-white shadow-2xl z-50 overflow-auto">
        <div class="p-6">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-bold">Your Bag</h3>
                <button onclick="toggleCart()" class="text-4xl">×</button>
            </div>
            <div id="cart-items" class="space-y-6"></div>
            
            <div class="mt-10 border-t pt-6">
                <div class="flex justify-between text-xl font-bold">
                    <span>Total</span>
                    <span id="cart-total">₹0</span>
                </div>
                <button onclick="checkout()" class="w-full mt-6 bg-black text-white py-4 rounded-xl font-bold text-lg">
                    PROCEED TO CHECKOUT
                </button>
            </div>
        </div>
    </div>

    <script>
        const products = [
            {
                id: 1,
                name: "Slim Fit Oxford Shirt",
                price: 1299,
                originalPrice: 2199,
                image: "https://picsum.photos/id/1015/400/500",
                category: "Shirt"
            },
            {
                id: 2,
                name: "Dark Blue Skinny Jeans",
                price: 1499,
                originalPrice: 2499,
                image: "https://picsum.photos/id/201/400/500",
                category: "Jeans"
            },
            {
                id: 3,
                name: "Polarized Sunglasses",
                price: 799,
                originalPrice: 1499,
                image: "https://picsum.photos/id/866/400/500",
                category: "Sunglasses"
            },
            {
                id: 4,
                name: "Black Leather Chelsea Boots",
                price: 2499,
                originalPrice: 3999,
                image: "https://picsum.photos/id/133/400/500",
                category: "Shoes"
            },
            {
                id: 5,
                name: "Smart Watch Ultra",
                price: 4599,
                originalPrice: 6999,
                image: "https://picsum.photos/id/180/400/500",
                category: "Watch"
            },
            {
                id: 6,
                name: "White Premium T-Shirt",
                price: 699,
                originalPrice: 1299,
                image: "https://picsum.photos/id/251/400/500",
                category: "T-Shirt"
            },
            {
                id: 7,
                name: "High Heel Stilettos",
                price: 1899,
                originalPrice: 2999,
                image: "https://picsum.photos/id/64/400/500",
                category: "Heels"
            },
            {
                id: 8,
                name: "Cargo Jogger Pants",
                price: 1199,
                originalPrice: 1999,
                image: "https://picsum.photos/id/201/400/500",
                category: "Pants"
            }
        ];

        let cart = [];

        function renderProducts() {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';

            products.forEach(product => {
                const discount = Math.round(((product.originalPrice - product.price) / product.originalPrice) * 100);
                
                const card = document.createElement('div');
                card.className = "product-card bg-white rounded-2xl overflow-hidden shadow-sm cursor-pointer";
                card.innerHTML = `
                    <div class="relative">
                        <img src="${product.image}" class="w-full h-80 object-cover">
                        <div class="absolute top-3 left-3 bg-red-500 text-white text-xs px-3 py-1 rounded-xl font-bold">
                            -${discount}%
                        </div>
                    </div>
                    <div class="p-4">
                        <p class="text-sm text-gray-500">${product.category}</p>
                        <p class="font-semibold text-lg mt-1">${product.name}</p>
                        
                        <div class="flex items-center gap-3 mt-3">
                            <span class="text-2xl font-bold">₹${product.price}</span>
                            <span class="line-through text-gray-400">₹${product.originalPrice}</span>
                        </div>
                        
                        <button onclick="addToCart(${product.id}); event.stopImmediatePropagation()" 
                                class="mt-5 w-full bg-orange-500 hover:bg-orange-600 text-white py-3 rounded-xl font-medium">
                            Add to Bag
                        </button>
                    </div>
                `;
                card.onclick = () => alert(`Viewing: ${product.name}`);
                grid.appendChild(card);
            });
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            const existing = cart.find(item => item.id === id);
            
            if (existing) existing.quantity += 1;
            else cart.push({...product, quantity: 1});

            updateCartCount();
            showToast(`${product.name} added to bag!`);
        }

        function updateCartCount() {
            let count = cart.reduce((acc, item) => acc + item.quantity, 0);
            document.getElementById('cart-count').textContent = count;
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.style.cssText = `position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:#f97316; color:white; padding:16px 28px; border-radius:50px; z-index:9999; font-weight:600;`;
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        function toggleCart() {
            const drawer = document.getElementById('cart-drawer');
            drawer.classList.toggle('hidden');
            if (!drawer.classList.contains('hidden')) renderCart();
        }

        function renderCart() {
            const container = document.getElementById('cart-items');
            container.innerHTML = '';
            let total = 0;

            cart.forEach((item, index) => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;

                const div = document.createElement('div');
                div.className = "flex gap-4 border-b pb-6";
                div.innerHTML = `
                    <img src="${item.image}" class="w-24 h-24 object-cover rounded-xl">
                    <div class="flex-1">
                        <p class="font-medium">${item.name}</p>
                        <p class="text-sm text-gray-500">Qty: ${item.quantity}</p>
                        <p class="font-bold mt-2">₹${itemTotal}</p>
                    </div>
                    <button onclick="removeFromCart(${index})" class="text-red-500 text-sm">Remove</button>
                `;
                container.appendChild(div);
            });

            document.getElementById('cart-total').textContent = `₹${total}`;
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            renderCart();
            updateCartCount();
        }

        function checkout() {
            alert("🎉 Order Placed Successfully!\nThank you for shopping with StyleOrbit ❤️");
            cart = [];
            updateCartCount();
            toggleCart();
        }

        // Initialize
        window.onload = renderProducts;
    </script>
</body>
</html>
